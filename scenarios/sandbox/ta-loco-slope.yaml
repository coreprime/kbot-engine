# TA slope speed clamp: the pitch-band percent table caps the speed scalar.
# Ground truth: locomotion spec §3.1-3.2 (table {25,55,70,85,100,100,75,50,
# 25,20,15}, band = pitch>>11 clamped +-5), substrate spec §1.2.
name: ta-loco-slope
game: ta
system: locomotion
spec: locomotion.md §3.1, §3.2
description: >-
  ARMFLASH climbs a uniform ramp rising 7 height units per 16-wu cell.
  The engine's pitch mixes RAW heightmap units with wu runs (its sim Y
  axis IS the height-byte scale), so the 2x2 footprint reads a 14-unit
  front/back delta over 32 wu: pitch 23.6 deg = 4301 angle units =
  band +2 -> speed cap MaxVelocity * 50 / 100. The scenario measures
  the steady climb speed.
seed: 1
duration: 240
terrain:
  width: 64
  height: 64
  cell_wu: 16
  height_scale: 0.5
  sea_level: 0
  ramp_axis: z
  ramp_step: 7
units:
  - alias: flash
    type: armflash
    side: 0
    pos: [512, 96]
    heading: 0
actions:
  - at: 0
    do: move
    unit: flash
    to: [512, 960]    # straight up the ramp
checks:
  - at: 200
    unit: flash
    observable: unit.speed
    expect: 65536
    label: steady climb speed on pitch band +2
    derivation: |
      The engine sim Y axis is the raw heightmap unit: a unit's integer Y
      compares directly against the map sea-level byte, and the footprint
      corners sample the raw byte grid — no render scale enters the sim.
      (The original derivation scaled heights by the 0.5 render factor
      before the atan2, halving the pitch — a unit error, corrected.)
      Ramp: 7 height units per 16-wu cell; ARMFLASH footprint is 2x2
      cells (movementclass TANKSH2), so front/back corners 32 wu apart
      read a delta of 32 * 7/16 = 14 units.
      pitch = atan2(14, 32) = 23.63 deg = 4301 TA-angle units.
      Band = 4301 >> 11 = +2 -> slope table 50%.
      cap = MaxVelocity 0x20000 * 50 / 100 = 65536 raw (1.0 wu/frame).
      Flash reaches the cap by frame ceil(65536/1114) = 59, so frame 200
      samples the steady state. A zero here means the sim's terrain
      legality refuses the climb outright; any other value is its
      substitute slope model.
    missing_if_zero: true
