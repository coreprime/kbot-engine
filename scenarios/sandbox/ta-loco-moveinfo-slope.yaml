# TA movement-class override + steep slope band: the moveinfo.tdf class
# replaces the FBI's own maxslope entirely, and the +3 pitch band caps
# speed at 25% of MaxVelocity.
# Ground truth: locomotion spec §4.1 (moveinfo wins over the FBI for the
# fields it carries), §3.1-3.2 (pitch band table).
name: ta-loco-moveinfo-slope
game: ta
system: locomotion
spec: locomotion.md §4.1, §3.1, §3.2
description: >-
  ARMFLASH climbs a ramp rising 12 height units per cell. Its own FBI
  says MaxSlope=10 (the climb would be illegal), but its movementclass
  TANKSH2 carries MaxSlope=15 and the class REPLACES the FBI value — so
  the climb is legal, and the band +3 pitch caps speed at 25%.
seed: 1
duration: 200
terrain:
  width: 64
  height: 64
  cell_wu: 16
  height_scale: 0.5
  sea_level: 0
  ramp_axis: z
  ramp_step: 12
units:
  - alias: flash
    type: armflash
    side: 0
    pos: [512, 96]
    heading: 0
actions:
  - at: 0
    do: move
    unit: flash
    to: [512, 960]    # straight up the ramp
checks:
  - at: 150
    unit: flash
    observable: unit.speed
    expect: 32768
    label: class-legal climb capped on pitch band +3
    derivation: |
      Legality: cell delta 12 vs the resolved maxslope. FBI MaxSlope=10
      would refuse the step (12 > 10); movementclass TANKSH2 declares
      MaxSlope=15 and the class copy replaces the FBI value entirely
      (§4.1), so 12 <= 15 is legal. Pitch on the raw height-unit axis:
      the 2x2 footprint's front/back corners 32 wu apart read a delta of
      32 * 12/16 = 24 units -> pitch = atan2(24, 32) = 36.87 deg = 6712
      TA-angle units; band = 6712 >> 11 = +3 -> slope table 25%.
      cap = 0x20000 * 25 / 100 = 32768 raw (0.5 wu/frame), reached by
      frame ceil(32768/1114) = 30; frame 150 samples the steady climb
      (the unit sits ~70 wu up the ramp, far from the 255-clamp region).
      Zero here means the FBI maxslope was used (climb refused) — the
      class override is missing.
    missing_if_zero: true
