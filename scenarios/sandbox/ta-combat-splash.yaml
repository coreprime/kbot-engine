# TA splash: quadratic falloff e + (1-e)(1 - d/r)^2 against 3-D AABB
# distance; damage truncates toward zero.
# Ground truth: combat spec §5.1.1 (disassembly-proven quadratic; an
# earlier flat-damage reading is explicitly wrong), §5.1.2.
#
# Weapon choice: CORPLAS_WEAPON (lineofsight, aoe 70 -> radius 35, edge
# default 0, [DAMAGE] armflash=200) — a direct-fire shot lands at the aim
# point, so the falloff is measured without the ballistic solver's aim
# error contaminating it. (A CORE_THUD variant of this scenario exposed a
# separate finding: the sandbox flies ballistic point-shots on a straight
# gravity-dropped line with no arc solution and lands ~111 wu short over
# a 200 wu shot.)
name: ta-combat-splash
game: ta
system: combat
spec: combat.md §5.1.1, §5.1.2
description: >-
  A CORPLAS tower force-fires at open ground 200 wu away. Two held
  ARMFLASH stand 12 wu and 40 wu from the aim point: the near one takes
  quadratic-falloff damage, the far one (center distance outside the
  35 wu radius) a 1-point rim clip that only the AABB-distance rule
  produces. Point force-fire repeats at the 24-tick reload, so the
  sample frame counts impacts.
seed: 1
duration: 80
terrain:
  width: 64
  height: 64
  cell_wu: 16
  height_scale: 0.5
  sea_level: 0
  base_height: 10
units:
  - alias: tower
    type: corplas
    side: 1
    pos: [200, 200]
    heading: 0
  - alias: near
    type: armflash
    side: 0
    pos: [412, 200]
    heading: 0
  - alias: far
    type: armflash
    side: 0
    pos: [400, 240]   # 40 wu from the aim point along Z. Corrected from
                      # [440, 200]: the original collinear spot sat 28 wu
                      # from the near Flash, inside the pair's 32 wu
                      # body-circle separation, so the collision pass
                      # shoved both props off their derived positions
                      # before the first shell landed.
    heading: 0
actions:
  - at: 0
    do: stance
    unit: near
    move: hold
    fire: hold
  - at: 0
    do: stance
    unit: far
    move: hold
    fire: hold
  - at: 0
    do: fire_at_point
    unit: tower
    slot: 0
    to: [400, 200]
checks:
  - at: 55
    unit: near
    observable: unit.hp
    expect: 313
    label: quadratic falloff 12 wu from the blast
    derivation: |
      Base damage vs objectname ARMFLASH = 200 (per-name table). d =
      blast-to-AABB distance; the Flash's 2x2 footprint approximates an
      8-wu half-extent box, so d = 12-8 = 4. r = 70/2 = 35, e = 0.
      mult = (1 - 4/35)^2 = (31/35)^2 = 0.7844897; per hit =
      ftol(200 * 0.7844897) = 156.
      Impacts: trigger pulls at t0 (assumed 1..11) then +24 ticks;
      flight 200 wu at 310 wu/s ~= 19 ticks -> impacts ~t0+19, ~t0+43.
      By frame 55 exactly two impacts: hp = 625 - 2*156 = 313.
      (Flat-full-damage models: 625 - 2*table = 225 with the per-name
      200, or 601 with only the default 10.)
  - at: 55
    unit: far
    observable: unit.hp
    expect: 623
    label: rim clip via AABB distance at 40 wu
    derivation: |
      Center distance 40 (along Z) exceeds the 35 radius, but the AABB
      face sits at 40-8 = 32 < 35: mult = (1 - 32/35)^2 = (3/35)^2 =
      0.0073469; per hit = ftol(200 * 0.0073469) = 1. Two impacts by
      frame 55 -> hp = 623. A model testing center distance against the
      radius deals 0 here (hp 625) — the delta isolates the bbox rule.
