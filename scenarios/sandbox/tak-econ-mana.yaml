# TA:K mana pool: spawn grant, per-tick income, per-tick build drain.
# Ground truth: economy spec §4.3 (income = rate * 0.03333333 per tick),
# §4.4 (spawn grant = starting units' mogriumstorage), §5.3 (applicator),
# §9.2 (worked example: builder workertime=10, lodestone buildtime=92,
# buildcost=280).
name: tak-econ-mana
game: tak
system: economy
spec: economy.md §4.3, §4.4, §5.3, §9.2
description: >-
  An Aramon builder (mogriumstorage=100, mogriumincome=1, workertime=10)
  raises a Lodestone (buildtime=92, buildcost=280) 30 wu away. The spawn
  grant seeds the pool with exactly the builder's storage 100; income adds
  1 * 0.03333333 per tick; the build drains eff*buildcost = 1.0144926
  mana per tick, throttled only when the pool runs dry.
seed: 1
duration: 320
units:
  - alias: builder
    type: arabuild
    side: 0
    pos: [200, 200]
    heading: 0
actions:
  - at: 0
    do: build
    unit: builder
    build: aralode
    to: [230, 200]
    spawns: lode
checks:
  - at: 3
    side: 0
    observable: side.mana
    expect: 6424997
    label: spawn grant of 100, then income minus early build drain
    derivation: |
      Spawn grant: pool[0] = builder mogriumstorage = 100.0 exactly (raw
      6553600), NOT the 1000-style TA start — the 100-vs-1000 opening stock
      is the dominant signal this check pins. The build order applies on
      frame 0; the first Step (tick 1) posts the grant and no drain yet
      (pool = 100.0 exactly at tick 1), then income (+f32(1*0.03333333) per
      tick) and the applicator's cost (1.0144926 mana/tick) run from tick 2.
      By tick 3 = 100 + 3*0.0333333 income - 2*1.0144926 drain = 98.0374
      (f32) -> raw trunc(98.0374 * 65536) = 6424997.
  - at: 60
    side: 0
    observable: side.mana
    baseline: 6553600
    expect: -3793783
    label: build drain against the pool
    derivation: |
      Per tick: eff = (10 * 0.03333333) * f32(1/92) = 0.0036231880;
      cost = eff * 280 = 1.0144926 mana. The pool stays above the per-tick
      demand (no throttle) through frame 60. With income from tick 1 and
      drain from tick 2, the f32 walk of §4.3+§5.3 lands pool(60) = 42.1112
      -> raw 2759817; effect vs the 100 grant (raw 6553600) =
      2759817 - 6553600 = -3793783. Zero movement = builds never touch
      the mana pool.
    missing_if_zero: true
  - at: 200
    unit: lode
    observable: unit.build_percent
    expect: 38
    label: pool-limited build pace
    derivation: |
      Progress per tick = eff = 0.36231884% while the pool covers the
      1.0144926 cost. The pool (100 grant + 0.0333/tick income) empties at
      ~frame 97; from then on the throttle ratio pool[2] and the live
      pool[0]-clamp hold work to the income-limited rate (~3.29% of full).
      The f32 walk of §4.3+§5.3 (income add, pool[2] = pool/demand_tick,
      clamp cost to pool) gives progress(200) = 38.095% -> integer 38.
      An unthrottled sim shows ~72 here; a fixed-8s-pace sim shows ~100.
