# TA cloak: a per-settle all-or-nothing energy drain that decloaks on
# failed payment; cloaked units leave LOS and become untargetable.
# Ground truth: specials spec §5.1, economy spec §1.5 (cloak drain),
# combat spec §2.1.6.
name: ta-cloak
game: ta
system: specials
spec: specials.md §5.1, economy.md §1.5
description: >-
  The Commander (CloakCost=200, CloakCostMoving=1000) is ordered to cloak
  and stands still. Each 1 Hz settle must drain trunc(200) energy
  all-or-nothing from the pool. The sandbox has no cloak order at all —
  the expected verdict is missing.
seed: 1
duration: 130
units:
  - alias: com
    type: armcom
    side: 0
    pos: [200, 200]
    heading: 0
actions:
  - at: 0
    do: cloak
    id: cloak-order
    unit: com
checks:
  - at: 125
    side: 0
    observable: side.energy
    baseline: 65536000
    expect: -47513600
    label: stationary cloak drain over four settles
    derivation: |
      Per settle: income lands and the pool clamps into storage, THEN the
      cloak drains ftol(CloakCost 200) energy all-or-nothing against the
      settled stock (specials.md §5.1). The pool opens AT its storage cap
      (start 1000, cap = max(start,200) = 1000, armcom declares no
      energystorage), so the commander's EnergyMake=25 is wasted on the
      first settle and only refills the space the cloak frees thereafter.
      Tracing the four settles (frames 30/60/90/120):
        s30: min(1000+25, cap 1000)=1000, cloak -200 -> 800
        s60: min(800+25, 1000)=825, -200 -> 625
        s90: 650 -> 450
        s120: 475 -> 275
      Stock at frame 125 = 275; effect vs the 1000 start = -725 ->
      raw -725 * 65536 = -47513600. (The prior derivation assumed the
      first settle's +25 accrued; it is wasted at the cap — a documented
      arithmetic correction; the sim's cloak+settle math is exact.)
    requires_action: cloak-order
