# TA assist stacking: two builders on one frame sum their build power
# additively and uncapped. Ground truth: economy spec §3.2 (assist is the
# sum of independent per-builder applicator ticks; no combined-rate math,
# no assister cap).
name: ta-econ-assist-stack
game: ta
system: economy
spec: economy.md §3.1, §3.2
description: >-
  Two Commanders (WorkerTime=300 each) raise one Metal Extractor
  (BuildTime=1800). The first commander issues the build (spawning the
  frame); the second repairs/assists the same frame. Each runs its own
  applicator at floor(300/30)=10 build points/tick, so the frame rises at
  20 points/tick and completes in half the single-builder time.
seed: 1
duration: 200
units:
  - alias: com1
    type: armcom
    side: 0
    pos: [160, 200]
    heading: 0
  - alias: com2
    type: armcom
    side: 0
    pos: [272, 200]
    heading: 0
actions:
  - at: 0
    do: build
    unit: com1
    build: armmex
    to: [216, 200]
    spawns: mex
  - at: 40
    do: repair
    unit: com2
    target: mex
checks:
  - at: 100
    unit: mex
    observable: unit.build_percent
    expect: 88
    label: assist doubles the build rate
    derivation: |
      com1 works from frame 2 at 10/1800 per tick (the applicator starts the
      tick after the frame spawns; the arm animation does not gate it). com2's
      repair/assist order (issued frame 40) joins around frame 42, from which
      the frame rises at the additive 20/1800 per tick (two independent
      applicators, no combined-rate math, no cap). By frame 100: com1 solo
      frames 2..41 = 40 ticks * 10/1800 = 22.2%, then both frames 42..100 =
      59 ticks * 20/1800 = 65.6%, total ~= 88% (f32, truncated). A single
      builder would sit at only (100-1)*10/1800 = 55% here -- the extra
      progress is the assist.
  - at: 140
    unit: mex
    observable: unit.build_percent
    expect: 100
    label: two assisting builders finish well before the single-builder time
    derivation: |
      Additive stacking finishes the 1800-point frame near frame 132 --
      far sooner than the 203-frame single-builder completion. By frame
      140 the extractor is complete (100%).
