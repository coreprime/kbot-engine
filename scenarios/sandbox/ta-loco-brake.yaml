# TA ground locomotion: brake to a stop when the move target is cancelled.
# Ground truth: locomotion spec §1.1-1.2 (no coast state; -brakerate per frame).
name: ta-loco-brake
game: ta
system: locomotion
spec: locomotion.md §1.1, §1.2, §9.1
description: >-
  ARMFLASH is run up to top speed toward a far waypoint, then given Stop.
  With no target the engine sets turn rate 0 and applies -BrakeRate every
  frame until the >=0 clamp; there is no instant stop and no coast.
seed: 1
duration: 300
units:
  - alias: flash
    type: armflash
    side: 0
    pos: [200, 200]
    heading: 0
actions:
  - at: 0
    do: move
    unit: flash
    to: [200, 3000]
  - at: 150          # frame 150: at top speed since frame 118
    do: stop
    unit: flash
checks:
  - at: 151
    unit: flash
    observable: unit.speed
    expect: 128452
    label: one frame after stop order
    derivation: |
      FBI BrakeRate=0.02 -> trunc(0.02 * 65536) = 1310 raw wu/frame^2.
      An action at frame N applies before frame N runs (the same harness
      convention the accel scenario's at:0 checks rely on), so frame 150
      is the FIRST braking frame. At the order speed = 0x20000 (top);
      speed(150) = 131072 - 1310, speed(151) = 131072 - 2*1310 = 128452.
      (Original derivation put the first brake frame at 151 — an
      off-by-one against the pinned action timing, corrected.) An
      instant zero here means the sim replaced the brake law with a
      hard stop.
  - at: 200
    unit: flash
    observable: unit.speed
    expect: 64262
    label: 51 frames into the brake ramp
    derivation: |
      Brake frames 150..200 inclusive = 51 updates:
      speed = 131072 - 51 * 1310 = 64262 raw (0.9806 wu/frame).
      (Corrected with the first-brake-frame fix above.)
  - at: 251
    unit: flash
    observable: unit.speed
    expect: 0
    label: stationary within 102 frames of braking
    derivation: |
      Frames to stop from 0x20000: ceil(131072 / 1310) = 101 braking
      updates, so speed clamps to 0 by frame 250 and stays 0 at the
      frame-251 sample (first brake frame 150).
