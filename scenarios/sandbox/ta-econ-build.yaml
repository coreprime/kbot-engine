# TA construction: nanolathe pacing, prorated resource drain, HP ladder.
# Ground truth: economy spec §1.1 (1 Hz settle), §3.1 (applicator), §9.1
# (worked example: ARMCOM WorkerTime=300 builds ARMMEX BuildTime=1800,
# BuildCostEnergy=521, BuildCostMetal=50, MaxDamage=170).
name: ta-econ-build
game: ta
system: economy
spec: economy.md §1.1, §2.2, §3.1, §9.1
description: >-
  The Commander raises a Metal Extractor 40 wu away (inside Builddistance
  60, so no approach walk). Per tick the applicator advances progress by
  floor(300/30)/1800 and posts prorated buildcost demand; the pools settle
  once per second against the commander's own income (EnergyMake 25,
  MetalMake 1). Skirmish-default 1000/1000 starting stock assumed.
seed: 1
duration: 420
units:
  - alias: com
    type: armcom
    side: 0
    pos: [200, 200]
    heading: 0
actions:
  - at: 0
    do: build
    unit: com
    build: armmex
    to: [240, 200]
    spawns: mex
checks:
  - at: 91
    unit: mex
    observable: unit.build_percent
    expect: 50
    label: nanolathe pace at mid-build
    derivation: |
      amount = floor(WorkerTime 300 / 30) = 10 build points per tick
      (unsigned integer division — fractional worker power discarded).
      Progress per tick = 10/1800; total = 1800/10 = 180 work ticks.
      The engine applies work the tick after the order reaches its site:
      frame 1 spawns the nanoframe (approach -> raising), the applicator
      runs from frame 2 (§9.1's per-tick table, tick 1 = remaining 0.99444,
      HP 1). The StartBuilding COB only animates the nano arm — it does not
      gate the applicator. Progress at frame T = (T-1) * 10/1800; mid-build
      50% = 90 work ticks = frame 91.
  - at: 181
    unit: mex
    observable: unit.build_percent
    expect: 100
    label: complete after 180 work ticks
    derivation: |
      Work runs frames 2..181 (§9.1: total = exactly 180 ticks); the
      extractor completes exactly on frame 181, progress = 100%.
  - at: 400
    unit: mex
    observable: unit.hp
    expect: 170
    label: HP ladder ends exactly at maxdamage
    derivation: |
      A nanoframe spawns at remaining=1.0, HP=0 and climbs the truncation
      ladder hpDelta = ftol(maxdamage*rem) - ftol(maxdamage*newRem); the
      ladder telescopes to exactly MaxDamage=170 at completion.
  - at: 65
    side: 0
    observable: side.energy
    baseline: 65536000
    expect: -7914928
    label: energy pool movement over two settles
    derivation: |
      Per-tick demand posts costE = f32(10/1800) * 521 = 2.8944445, from
      frame 2 (the first applicator tick; the arm animation does not gate
      it). Settles land at frames 30 and 60. Window ending 30 covers work
      frames 2..30 = 29 ticks (demand 83.94 E); window ending 60 covers
      frames 31..60 = 30 ticks (demand 86.83 E). Each settle also credits
      EnergyMake=25 and clamps into the 1000 cap (commander declares no
      energystorage). Settle 30: 1000 + 25 - 83.94 = 941.06. Settle 60:
      941.06 + 25 - 86.83 = 879.23. Effect vs the 1000 start = -120.77
      (f32 x87 vs fixed cannot agree bit-for-bit; the magnitude grades the
      drain + settle-cap model). Zero movement means the build never drained
      the pool at all.
    missing_if_zero: true
  - at: 65
    side: 0
    observable: side.metal
    baseline: 65536000
    expect: -942988
    label: metal pool movement over two settles
    derivation: |
      costM = f32(10/1800) * 50 = 0.2777778/tick, from frame 2. Window
      ending 30 = 29 ticks (8.056 M demand); window ending 60 = 30 ticks
      (8.333 M). Income MetalMake=1/settle; cap 1000. Settle 30:
      1000 + 1 - 8.056 = 992.94. Settle 60: 992.94 + 1 - 8.333 = 985.61;
      effect vs the 1000 start = -14.39. Zero movement means the build
      never drained the pool.
    missing_if_zero: true
