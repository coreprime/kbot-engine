# TA capture: free, channel time from the target's cost/HP/veterancy;
# completion re-spawns the target for the capturer and destroys the
# original with kind 4 (no wreck).
# Ground truth: economy spec §3.6, specials spec §2.1.
name: ta-capture
game: ta
system: specials
spec: economy.md §3.6, specials.md §2.1
description: >-
  The Commander (CanCapture=1) captures an enemy Solar Collector standing
  inside build range. Duration for a full-HP, zero-kill ARMSOLAR
  (BuildCostEnergy=760, BuildCostMetal=145, MaxDamage=326) is exactly 192
  ticks. The sandbox has no capture order — expected verdict missing.
seed: 1
duration: 260
units:
  - alias: com
    type: armcom
    side: 0
    pos: [200, 200]
    heading: 0
  - alias: solar
    type: armsolar
    side: 1
    pos: [250, 200]
    heading: 0
actions:
  - at: 0
    do: stance
    unit: com
    move: hold
    fire: hold
  - at: 0
    do: capture
    id: capture-order
    unit: com
    target: solar
checks:
  - at: 230
    unit: solar
    observable: unit.alive
    expect: 0
    label: original destroyed on capture completion
    derivation: |
      T0 = trunc(760*30*0.0005 + 145*30*(1/140) + 150) = trunc(11.4 +
      31.071 + 150) = 192; T1 = min(192, 1800) = 192; full HP: T2 =
      (326+326)*192/(2*326) = 192; 0 kills: T = ((0/5+10)*192*10)/100 =
      192 ticks of channel (+ a few frames of order startup). At frame
      230 the capture has completed: a fresh side-0 ARMSOLAR exists and
      the ORIGINAL side-1 unit was destroyed (kind 4, no wreck) — its
      alive flag reads 0. The capturer holds fire so only the capture
      channel (not its laser) accounts for the original's removal. No
      resource cost anywhere in the channel.
    requires_action: capture-order
  - at: 230
    side: 0
    unit: armsolar
    observable: side.unit_count
    expect: 1
    label: solar respawned under the capturer's side
    derivation: |
      Ownership transfer is destroy-plus-respawn (specials.md §2.1): the
      captured ARMSOLAR reappears under side 0 (the capturer's side) at the
      same position. Side 0 opened with only the Commander (no armsolar), so
      after the capture it owns exactly one armsolar.
    requires_action: capture-order
  - at: 230
    side: 1
    unit: armsolar
    observable: side.unit_count
    expect: 0
    label: original owner loses the unit
    derivation: |
      The captured unit left side 1: side 1 owned one armsolar before the
      capture and zero after (the id was destroyed, the body respawned
      under side 0). The flip is exact and the kills counter is NOT carried
      across (a fresh body).
    requires_action: capture-order
