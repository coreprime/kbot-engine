# TA per-shot economy: the fire gate requires FULL energypershot in stock;
# an empty pool blocks the shot until income refills it.
# Ground truth: combat spec §3.1.4 (gate order: reload, range, resources),
# economy spec §2.3 (weapon fire hard-gated per shot, all-or-nothing).
name: ta-econ-fire-gate
game: ta
system: economy
spec: combat.md §3.1.4, economy.md §2.3
description: >-
  The Commander D-guns a ground point three times (explicit commandfire
  orders at frames 0, 60, 120). ARM_DISINTEGRATOR costs 400 energy per
  shot; from the 1000 start the first two shots leave 200+income, so the
  third order must WAIT for the commander's 25 E/s settle income to
  rebuild a full 400 before it fires (~frame 300).
seed: 1
duration: 310
units:
  - alias: com
    type: armcom
    side: 0
    pos: [200, 200]
    heading: 0
actions:
  - at: 0
    do: fire_at_point
    unit: com
    slot: 2
    to: [300, 200]
  - at: 60
    do: fire_at_point
    unit: com
    slot: 2
    to: [300, 200]
  - at: 120
    do: fire_at_point
    unit: com
    slot: 2
    to: [300, 200]
checks:
  - at: 95
    side: 0
    observable: side.energy
    baseline: 65536000
    expect: -47513600
    label: two D-gun shots drain 800 energy
    derivation: |
      Shots 1 and 2 (frames ~1 and ~61) each drain energypershot=400
      immediately (all-or-nothing, after launch). Settles at frames 30,
      60, 90 credit EnergyMake=25 each. Effect at frame 95 =
      -800 + 3*25 = -725 -> raw -725 * 65536 = -47513600.
      Zero movement = per-shot drains don't reach the pool at all.
    missing_if_zero: true
  - at: 200
    unit: com
    observable: unit.fire_count
    expect: 2
    label: third shot still gated while stock below 400
    derivation: |
      commandfire = one discharge per explicit order; the D-gun re-aims
      between orders, so shot 1 releases on frame 14 and shot 2 on frame 95
      (each -400 immediately). After shot 2 the pool is at 275 and climbs
      +25/settle. The frame-120 order pends at the per-tick resource gate
      until the pool reaches a FULL 400. At frame 200 the pool holds 350
      (< 400), so exactly 2 shots have fired. A count of 3 here means the
      sim fires without checking stock.
  - at: 240
    side: 0
    observable: side.energy
    expect: 26214400
    label: pool reaches the 400 gate threshold
    derivation: |
      From 275 after shot 2, +25/settle income refills the pool. It first
      equals energypershot=400 at frame 240 -> raw 400 * 65536 = 26214400.
      The gate releases the pending shot on the very next tick.
  - at: 250
    unit: com
    observable: unit.fire_count
    expect: 3
    label: third shot fires once a full 400 is in stock
    derivation: |
      The gate held the frame-120 order for 120+ ticks until stock rebuilt
      to 400 at frame 240; the shot releases on frame 241, draining the
      pool to 0. By frame 250 all three shots have fired. This confirms the
      gate delays (not drops) the shot until the full per-shot cost is
      affordable.
