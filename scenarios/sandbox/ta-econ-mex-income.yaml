# TA metal extractor income: yield = extractsmetal * sum over footprint
# cells of (cell metal byte + 1), cached at placement, credited per settle.
# Ground truth: economy spec §1.5 branch 1 (no extraction radius; footprint
# cells only; energyOK gate).
name: ta-econ-mex-income
game: ta
system: economy
spec: economy.md §1.1, §1.5
description: >-
  A lone completed ARMMEX (ExtractsMetal=0.001, EnergyUse=3, footprint
  3x3, ActivateWhenBuilt) stands on a metal patch of value 40 in every
  footprint cell. Expected income = 0.001 * 9 * (40+1) = 0.369 metal per
  settle while the energy axis is unstalled. The side opens with an empty
  metal pool (below the max(start,200)=200 storage cap) so the extractor's
  per-settle income accumulates in the pool instead of overflowing the cap.
seed: 1
duration: 310
# Empty opening metal so income is observable (not clamped at cap); energy
# starts full to cover the 3 E/s extractor demand for the whole run.
start_metal: -1
start_energy: 1000
terrain:
  width: 32
  height: 32
  # 16 wu per cell: the ARMMEX at [200, 200] anchors on cell (12, 12); its
  # 3x3 footprint covers cells 11..13 on each axis. A metal-40 patch over
  # exactly that footprint gives Sigma(metal+1) = 9 * 41 = 369.
  metal_patches:
    - cell_x: 11
      cell_z: 11
      width: 3
      height: 3
      metal: 40
units:
  - alias: mex
    type: armmex
    side: 0
    pos: [200, 200]
    heading: 0
checks:
  - at: 305
    side: 0
    observable: side.metal
    expect: 241827
    label: extractor yield over ten settles
    derivation: |
      Placement-time cached yield = f32(0.001 * (9 cells * (40+1)))
      = 0.36899999 metal per settle. Settles land on frames 30, 60, ...,
      300 = ten credits; the empty opening pool (start_metal 0) accumulates
      f32 sum 3.6899998 -> raw trunc(3.6899998 * 65536) = 241827. The
      metal-40 patch is declared as TNT plot-cell input (a real map cell
      attribute, not a unit stat). Zero movement means map-metal income is
      entirely absent from the sandbox.
    missing_if_zero: true
  - at: 305
    side: 0
    observable: side.energy
    baseline: 65536000
    expect: -1966080
    label: extractor energy demand over ten settles
    derivation: |
      EnergyUse=3 posts 3 energy demand per settle; ten settles drain 30
      energy from the full 1000 start. Effect = -30 -> raw
      -30 * 65536 = -1966080. This confirms the energyOK gate has energy
      to satisfy (an energy stall would halt metal extraction).
