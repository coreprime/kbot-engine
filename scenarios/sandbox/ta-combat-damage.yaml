# TA damage resolution: the [DAMAGE] table keys on the TARGET's objectname
# and replaces the default outright; direct hits use multiplier 1.0.
# Ground truth: combat spec §5.1.1 (direct hit mult 1.0), §5.1.2 (per-name
# table), §3.1.5 (fire-path RNG draws on the sim MINSTD stream).
name: ta-combat-damage
game: ta
system: combat
spec: combat.md §5.1.1, §5.1.2, §3.1.5
description: >-
  A CORPLAS tower (CORPLAS_WEAPON: default=10, armflash=200, reload 0.8s)
  is ordered to attack an ARMFLASH held 100 wu away (hold/hold stance so
  the victim neither flees nor returns fire). The per-name entry must
  land 200 per hit — a sim reading only the default deals 10.
seed: 1
duration: 100
units:
  - alias: tower
    type: corplas
    side: 1
    pos: [200, 200]
    heading: 0
  - alias: flash
    type: armflash
    side: 0
    pos: [300, 200]
    heading: 0
actions:
  - at: 0
    do: stance
    unit: flash
    move: hold
    fire: hold
  - at: 0
    do: attack
    unit: tower
    target: flash
checks:
  - at: 40
    unit: flash
    observable: unit.hp
    expect: 425
    label: one direct hit with the per-name table
    derivation: |
      base = per-name entry for objectname ARMFLASH = 200 (replaces
      default=10). Direct hit multiplier 1.0; attacker veterancy 0 kills;
      defender not ARMORED and vet 0 -> damage = 200 exactly.
      MaxDamage 625 - 200 = 425. Timing: shot ~frame 1-5, flight 100 wu
      at 310 wu/s ~= 10 frames -> first impact well before frame 40;
      second shot impacts ~frame 35+ so sample may straddle it — the
      per-hit quantum (200 vs 10) still dominates any miscount.
  - at: 40
    observable: world.rng_draws
    expect: 4
    label: fire path consumes the sim RNG stream
    derivation: |
      Unit initialisation draws 2 per unit for facing randomisation
      (2 units = 4). The turret accuracy path draws NOTHING here — a
      correction of this check's original expect=6: the spread formula is
      accuracy + 0x800 - (hp<<11)/maxhp, and at full HP the health term
      is exactly 0x800, cancelling the base, so spread = accuracy = 0 for
      CORPLAS_WEAPON and rand(0) returns without advancing the stream
      (the small-bound rule). CORPLAS has no burst/sprayangle either, so
      the stream stands at exactly the 4 init draws at any frame. Zero
      draws = combat consumes no RNG at all, which breaks any attempt to
      replicate the engines' downstream draw order.
    missing_if_zero: true
